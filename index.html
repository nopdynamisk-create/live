<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSI Live Overlay</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #0d0d0d;
            color: #e0e0e0;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: #111;
            border: 1px solid #00d2ff33;
            border-radius: 16px;
            padding: 48px;
            max-width: 480px;
            width: 90%;
            box-shadow: 0 0 40px #00d2ff11, 0 16px 48px rgba(0,0,0,0.6);
        }

        h1 {
            color: #00d2ff;
            font-size: 22px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 32px;
        }

        h1 span {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #00d2ff;
            border-radius: 50%;
            margin-right: 10px;
            vertical-align: middle;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        ol {
            list-style: none;
            counter-reset: steps;
            margin-bottom: 32px;
        }

        ol li {
            counter-increment: steps;
            display: flex;
            align-items: flex-start;
            gap: 14px;
            margin-bottom: 18px;
            color: #aaa;
            font-size: 14px;
            line-height: 1.5;
        }

        ol li::before {
            content: counter(steps);
            min-width: 26px;
            height: 26px;
            background: #00d2ff14;
            border: 1px solid #00d2ff44;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #00d2ff;
            font-size: 12px;
            font-weight: bold;
        }

        button {
            width: 100%;
            background: #00d2ff;
            color: #000;
            border: none;
            padding: 16px 24px;
            border-radius: 10px;
            font-size: 15px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            letter-spacing: 1px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        button:hover {
            background: #33ddff;
            box-shadow: 0 0 20px #00d2ff55;
        }

        button:active {
            transform: scale(0.98);
        }

        #status {
            margin-top: 14px;
            font-size: 12px;
            color: #555;
            text-align: center;
            min-height: 18px;
        }

        #status.ok { color: #00d2ff; }
        #status.err { color: #ff5555; }
    </style>
</head>
<body>

<div class="card">
    <h1><span></span>SSI Live Overlay</h1>

    <ol>
        <li>Åpne SSI Live Scores i en annen fane i samme nettleser.</li>
        <li>Gå tilbake til denne siden.</li>
        <li>Trykk knappen under – overlayет dukker opp øverst til høyre.</li>
    </ol>

    <button id="loadOverlay">▶ Last inn overlay</button>
    <div id="status"></div>
</div>

<script>
    document.getElementById("loadOverlay").onclick = async () => {
        let status = document.getElementById("status");
        status.className = "";
        status.textContent = "Laster...";

        try {
            const code = await fetch("./overlay.js").then(r => {
                if (!r.ok) throw new Error("Kunne ikke laste overlay.js");
                return r.text();
            });

            // Fjern eksisterende overlay hvis det finnes
            let existing = document.getElementById("ssi-live-overlay");
            if (existing) existing.remove();
            if (window.ssiLiveInterval) clearInterval(window.ssiLiveInterval);

            eval(code);

            status.className = "ok";
            status.textContent = "✓ Overlay aktivt – oppdateres hvert 2. sekund";
        } catch (err) {
            status.className = "err";
            status.textContent = "✗ Feil: " + err.message;
        }
    };
</script>

</body>
</html>
