<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSI Live – Top 10 per divisjon</title>
<style>
  :root {
    --bg:      #0d0d0d;
    --surface: #141414;
    --border:  #ffffff0f;
    --accent:  #00d2ff;
    --green:   #7CFC00;
    --text:    #e0e0e0;
    --muted:   #555;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; min-height: 100vh; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 12px; padding: 14px 20px;
    border-bottom: 1px solid #00d2ff22; background: #00d2ff08;
  }
  .header-left h1 { font-size: 16px; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; }
  .header-left h1 span {
    display: inline-block; width: 9px; height: 9px;
    background: var(--accent); border-radius: 50%; margin-right: 8px;
    vertical-align: middle; animation: pulse 1.5s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.2} }
  #status-text { font-size: 11px; color: var(--muted); margin-top: 3px; }
  #status-text.ok  { color: var(--accent); }
  #status-text.err { color: #ff5555; }

  .controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .controls input {
    background: #1a1a1a; border: 1px solid #333; border-radius: 8px;
    color: var(--text); font-family: inherit; font-size: 13px;
    padding: 7px 12px; width: 130px; outline: none; transition: border-color .2s;
  }
  .controls input:focus { border-color: var(--accent); }
  .controls input::placeholder { color: var(--muted); }
  .controls button {
    background: var(--accent); border: none; border-radius: 8px; color: #000;
    cursor: pointer; font-family: inherit; font-size: 13px; font-weight: bold;
    padding: 7px 14px; transition: opacity .15s;
  }
  .controls button:hover { opacity: .85; }
  .controls button:disabled { opacity: .4; cursor: not-allowed; }
  #ws-status {
    font-size: 11px; padding: 4px 10px; border-radius: 20px;
    border: 1px solid var(--muted); color: var(--muted);
  }
  #ws-status.live    { border-color: var(--green); color: var(--green); }
  #ws-status.partial { border-color: #ffaa00; color: #ffaa00; }
  #ws-status.err     { border-color: #ff5555; color: #ff5555; }

  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 14px; padding: 16px 20px;
  }
  .div-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .div-card-title {
    background: #00d2ff0f; border-bottom: 1px solid #00d2ff1a;
    color: var(--accent); font-size: 11px; font-weight: bold;
    letter-spacing: 1.5px; padding: 7px 12px; text-transform: uppercase;
    display: flex; justify-content: space-between; align-items: center;
  }
  .div-count { color: var(--muted); font-size: 10px; font-weight: normal; letter-spacing: 0; }
  table { border-collapse: collapse; width: 100%; font-size: 12px; }
  td { padding: 5px 10px; border-bottom: 1px solid #ffffff06; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #00d2ff06; }
  .td-rank { width: 24px; font-size: 11px; color: var(--muted); font-weight: bold; }
  .td-hf   { width: 68px; color: var(--green); font-weight: bold; }
  .td-name { color: #ddd; }
  .td-stg  { width: 40px; color: var(--muted); font-size: 10px; text-align: right; }
  .rank-1  { color: #ffd700 !important; }
  .rank-2  { color: #c0c0c0 !important; }
  .rank-3  { color: #cd7f32 !important; }
  .empty-msg { color: var(--muted); font-size: 12px; padding: 14px 12px; text-align: center; }

  #message { display:none; padding: 50px 20px; text-align:center; color: var(--muted); font-size:14px; line-height:2; }
  #message.err { color: #ff7777; }
  .spinner {
    display: inline-block; width: 18px; height: 18px;
    border: 2px solid #333; border-top-color: var(--accent);
    border-radius: 50%; animation: spin .7s linear infinite;
    vertical-align: middle; margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1><span></span>SSI Live – Top 10 per divisjon</h1>
    <div id="status-text">Skriv inn match-ID og klikk Koble til</div>
  </div>
  <div class="controls">
    <input id="match-input" type="number" placeholder="Match-ID" value="24850" min="1"/>
    <button id="connect-btn">Koble til</button>
    <div id="ws-status">FRAKOBLET</div>
  </div>
</header>

<div id="message"></div>
<div id="grid"></div>

<script>
// ── KONFIGURASJON ─────────────────────────────────────────────
const WORKER = "https://ssi-proxy.nop-dynamisk.workers.dev";
// ─────────────────────────────────────────────────────────────

const DIVISIONS = ["Open","Standard","Classic","Production","Production Optics","Optics"];
const TOP_N = 10;

let shooters  = {};   // { id: { navn, divisjon, stages: { stageId: hf } } }
let stages    = [];
let sockets   = [];
let liveCount = 0;
let matchId   = null;

const grid       = document.getElementById("grid");
const message    = document.getElementById("message");
const statusText = document.getElementById("status-text");
const connectBtn = document.getElementById("connect-btn");
const wsStatus   = document.getElementById("ws-status");
const matchInput = document.getElementById("match-input");

matchInput.addEventListener("keydown", e => { if (e.key === "Enter") connect(); });
connectBtn.addEventListener("click", connect);

async function connect() {
  const id = matchInput.value.trim();
  if (!id) return;

  matchId   = id;
  shooters  = {};
  stages    = [];
  liveCount = 0;
  disconnectAll();
  renderGrid();
  showMessage('<span class="spinner"></span> Henter stage-informasjon...', "");
  connectBtn.disabled = true;
  wsStatus.className  = "";
  wsStatus.textContent = "KOBLER...";

  try {
    const resp = await fetch(`${WORKER}/stages/${matchId}/`);
    if (!resp.ok) {
      const err = await resp.json().catch(()=>({}));
      throw new Error(err.error || `HTTP ${resp.status}`);
    }
    const data = await resp.json();
    stages = data.stages.map(s => s.id);

    if (stages.length === 0) throw new Error("Ingen stages funnet for denne kampen.");

    setStatus(`Kobler til ${stages.length} stages...`, "");
    hideMessage();
    renderGrid();
    openWebSockets();

  } catch(e) {
    showMessage(`Feil: ${e.message}`, "err");
    setStatus("Feil ved tilkobling", "err");
    wsStatus.className   = "err";
    wsStatus.textContent = "FEIL";
  } finally {
    connectBtn.disabled = false;
  }
}

function openWebSockets() {
  disconnectAll();
  liveCount = 0;

  stages.forEach(stageId => {
    // Koble via Worker-proxyen i stedet for direkte til SSI
    const wsUrl = `${WORKER.replace("https://","wss://")}/ws/${matchId}/${stageId}/`;
    let ws;

    try {
      ws = new WebSocket(wsUrl);
    } catch(e) {
      return;
    }

    ws.onopen = () => {
      liveCount++;
      updateWsStatus();
      if (liveCount === stages.length) {
        setStatus(`Live · kobler til alle ${stages.length} stages`, "ok");
      }
    };

    ws.onmessage = event => {
      try {
        const data = JSON.parse(event.data);
        handleScoreMessage(data, stageId);
      } catch(e) {}
    };

    ws.onclose = () => {
      liveCount = Math.max(0, liveCount - 1);
      updateWsStatus();
    };

    ws.onerror = () => {
      liveCount = Math.max(0, liveCount - 1);
      updateWsStatus();
    };

    sockets.push(ws);
  });
}

function handleScoreMessage(data, stageId) {
  // SSI sender typisk: { type: "score", competitor_id, name, division, hit_factor, ... }
  // eller en liste med scores
  const items = Array.isArray(data) ? data
    : data.scores   ? data.scores
    : data.results  ? data.results
    : data.type === "score" || data.competitor_id ? [data]
    : [];

  let updated = false;

  items.forEach(score => {
    const id   = String(score.competitor_id || score.id || score.shooter_id || "");
    const hf   = parseFloat(score.hit_factor || score.hitfactor || score.hf || 0);
    const div  = score.division || score.div || "";
    const navn = score.name || score.competitor_name || "";

    if (!id || isNaN(hf) || hf < 0) return;

    if (!shooters[id]) shooters[id] = { navn:"", divisjon:"", stages:{} };
    if (navn) shooters[id].navn     = navn;
    if (div)  shooters[id].divisjon = div;

    // Behold beste HF per stage per skytt
    const prev = shooters[id].stages[stageId];
    if (prev === undefined || hf > prev) {
      shooters[id].stages[stageId] = hf;
      updated = true;
    }
  });

  if (updated) {
    renderGrid();
    const now = new Date().toLocaleTimeString("nb-NO");
    const total = Object.keys(shooters).length;
    setStatus(`Live · ${total} skytt · ${now}`, "ok");
  }
}

function renderGrid() {
  const perDiv = {};
  DIVISIONS.forEach(d => perDiv[d] = []);

  const norm = s => (s||"").toLowerCase().replace(/[\s_\-]/g,"");

  Object.values(shooters).forEach(s => {
    const divMatch = DIVISIONS.find(d =>
      norm(s.divisjon).includes(norm(d)) ||
      norm(d).includes(norm(s.divisjon))
    );
    if (!divMatch) return;

    const totalHF  = Object.values(s.stages).reduce((a,b)=>a+b, 0);
    const stgCount = Object.keys(s.stages).length;
    if (totalHF <= 0) return;

    perDiv[divMatch].push({ navn: s.navn, hf: totalHF, stg: stgCount });
  });

  grid.innerHTML = "";
  DIVISIONS.forEach(div => {
    const list = perDiv[div].sort((a,b)=>b.hf-a.hf).slice(0, TOP_N);
    const card = document.createElement("div");
    card.className = "div-card";

    let rows = list.length === 0
      ? `<div class="empty-msg">Ingen data ennå</div>`
      : `<table>${list.map((s,i) => {
          const rc = i===0?"rank-1":i===1?"rank-2":i===2?"rank-3":"";
          return `<tr>
            <td class="td-rank ${rc}">${i+1}</td>
            <td class="td-hf">${s.hf.toFixed(4)}</td>
            <td class="td-name">${esc(s.navn)}</td>
            <td class="td-stg">${s.stg}stg</td>
          </tr>`;
        }).join("")}</table>`;

    card.innerHTML = `
      <div class="div-card-title">${div}
        <span class="div-count">${list.length} skytt${list.length!==1?"ere":""}</span>
      </div>${rows}`;
    grid.appendChild(card);
  });
}

function disconnectAll() {
  sockets.forEach(ws => { try { ws.close(); } catch(e){} });
  sockets = [];
}

function updateWsStatus() {
  const total = stages.length || 1;
  if (liveCount === 0) {
    wsStatus.className   = "err";
    wsStatus.textContent = "FRAKOBLET";
  } else if (liveCount < total) {
    wsStatus.className   = "partial";
    wsStatus.textContent = `DELVIS ${liveCount}/${total}`;
  } else {
    wsStatus.className   = "live";
    wsStatus.textContent = `LIVE ${liveCount}/${total}`;
  }
}

function showMessage(html, type) {
  message.style.display = "block";
  message.innerHTML = html;
  message.className = type;
}
function hideMessage() { message.style.display = "none"; }
function setStatus(t, type) { statusText.textContent = t; statusText.className = type; }
function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
</script>
</body>
</html>
