<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSI Live Overlay</title>

    <style>
        body{
            background:#111;
            color:white;
            font-family:Arial,sans-serif;
            padding:40px;
        }

        h1{
            color:#00d2ff;
        }

        button{
            background:#00d2ff;
            color:black;
            border:none;
            padding:15px 25px;
            border-radius:10px;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            opacity:0.9;
        }
    </style>
</head>
<body>

<h1>SSI Live Overlay</h1>

<p>
1. Åpne SSI Live Scores i en annen tab.
</p>

<p>
2. Gå tilbake hit.
</p>

<p>
3. Trykk knappen under.
</p>

<button id="loadOverlay">
    Load Live Overlay
</button>

<script>

    document.getElementById("loadOverlay").onclick = async () => {

        const code = await fetch("./overlay.js")
            .then(r => r.text());

        eval(code);

    };

</script>

</body>
</html>
